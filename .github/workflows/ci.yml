name: Enterprise CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build, Test, and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Verify Dependencies & Build
        run: mvn clean install -DskipTests
        working-directory: .

      - name: Run Unit Tests
        run: mvn test
        working-directory: .

      - name: Static Analysis (Placeholder)
        run: |
          echo "Running Static Analysis (e.g., Checkstyle, PMD, SpotBugs)..."
          # mvn checkstyle:check
          # mvn pmd:check

      - name: Package Application
        run: mvn package -DskipTests
        working-directory: .

      - name: Docker Build (Placeholder)
        run: |
          echo "Building Docker Images..."
          # docker compose build

      - name: Kubernetes Deployment (Placeholder)
        run: |
          echo "Applying Kubernetes Manifests..."
          # kubectl apply -f k8s/

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always() # Upload reports even if tests fail
        with:
          name: surefire-test-reports
          path: "**/target/surefire-reports/"
          retention-days: 7
