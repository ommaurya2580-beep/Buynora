server:
  port: 8081

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: authentication-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-ddd8872-ommaurya2580-d113.e.aivencloud.com:28760/defaultdb?sslMode=REQUIRED}
    username: ${SPRING_DATASOURCE_USERNAME:avnadmin}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:9a4f2c8d7e1b5a3c6f8e0d2c4b6a8f1e3c5d7b9a2f4e6c8b0d2e4f6a8c0b2d4e}
  expiration: ${JWT_EXPIRATION:86400000}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

